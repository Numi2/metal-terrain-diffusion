name: Anunaki
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: "17.0"
packages:
  MetalTerrainDiffusionPro:
    path: ..
targets:
  Anunaki:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Anunaki
    resources:
      - path: AnunakiModels
    dependencies:
      - package: MetalTerrainDiffusionPro
        product: AnunakiGame
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.Anunaki
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Anunaki
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
