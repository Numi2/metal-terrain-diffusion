data:
  dataset: /tmp/anunaki_smoke_dataset.npz
  val_fraction: 0.25
  seed: 5819
  max_train_samples: 4
  max_val_samples: 2
model:
  width: 8
  depth: 3
optim:
  epochs: 1
  batch_size: 1
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  grad_accum_steps: 1
run:
  out_dir: /tmp/anunaki_smoke_run
  device: cpu
  sample_every_epochs: 1
  checkpoint_every_epochs: 1
  num_workers: 0
  deterministic: true
